timeoutSeconds: 1800

review:
  profile: strict
  minConfidence: 70
  formatterSuggestions:
    automatic: false
    command: "python3 scripts/m066-formatter-smoke.py"
    maxSuggestions: 1
  triggers:
    onSynchronize: true
  suppressions:
    - pattern: "glob:*"
      paths:
        - "src/api/**"
  pathInstructions:
    - path: "src/api/**"
      instructions: |
        Treat all auth and token handling as high-risk. Require explicit validation and safe defaults.
        Prioritize findings in security, input validation, and error handling over style concerns.
    - path: "docs/**"
      instructions: |
        Keep review lightweight for docs-only changes unless instructions are clearly unsafe or incorrect.

write:
  enabled: true
  allowPaths:
    - "src/**"
    - "tests/**"
    - "docs/**"
    - "README.md"
